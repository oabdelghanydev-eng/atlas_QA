<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أطلس العبقري الصغير - فانوس المعرفة</title>
    <meta name="description" content="بنك أسئلة مسابقة فانوس المعرفة للمرحلة الابتدائية - 500 سؤال وجواب" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap"
        rel="stylesheet" />
    <!-- Font Awesome (Local) -->
    <link rel="stylesheet" href="libs/fontawesome/fontawesome-free-6.5.1-web/css/all.min.css" />
    <!-- Material Symbols (Local) -->
    <link rel="stylesheet" href="libs/material-symbols/material-symbols.css" />
    <!-- Bootstrap Icons (Local) -->
    <link rel="stylesheet" href="libs/bootstrap-icons/package/font/bootstrap-icons.min.css" />
    <!-- Phosphor Icons (Local) -->
    <link rel="stylesheet" href="libs/phosphor-icons/package/src/regular/style.css" />
    <style>
        /* ===== Icon Libraries Inline Fix ===== */
        .material-symbols-outlined {
            font-size: inherit !important;
            vertical-align: middle;
            line-height: 1;
        }

        .q-label .material-symbols-outlined {
            font-size: 0.75rem !important;
        }

        .q-label i,
        .q-label .bi,
        .q-label .ph {
            font-size: inherit;
            vertical-align: middle;
        }

        .category-header .material-symbols-outlined {
            font-size: 2.5rem !important;
        }

        /* ===== CSS Variables ===== */
        :root {
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-tertiary: #24243e;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #b8b5d0;
            --accent-1: #ff6b6b;
            --accent-2: #feca57;
            --accent-3: #48dbfb;
            --accent-4: #ff9ff3;
            --accent-5: #54a0ff;
            --accent-6: #5f27cd;
            --accent-7: #01a3a4;
            --accent-8: #f368e0;
            --accent-9: #ff9f43;
            --accent-10: #00d2d3;
            --green: #00b894;
            --radius: 20px;
            --radius-sm: 14px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary), var(--bg-tertiary));
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== Floating Background Elements ===== */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-shapes span {
            position: absolute;
            display: block;
            font-size: 2rem;
            animation: floatUp linear infinite;
            opacity: 0.15;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0;
            }

            10% {
                opacity: 0.15;
            }

            90% {
                opacity: 0.15;
            }

            100% {
                transform: translateY(-10vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        /* ===== Hero Header ===== */
        .hero {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 20px 40px;
            background: linear-gradient(180deg, rgba(93, 39, 205, 0.3), transparent);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent-2);
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-9), var(--accent-1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease 0.1s both;
            line-height: 1.3;
        }

        .hero h1 .lamp {
            display: inline-block;
            font-size: 1.2em;
            -webkit-text-fill-color: initial;
            animation: swing 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(254, 202, 87, 0.6));
        }

        @keyframes swing {

            0%,
            100% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }
        }

        .hero p {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            color: var(--text-secondary);
            animation: fadeInDown 0.8s ease 0.2s both;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            padding: 15px 25px;
            text-align: center;
            min-width: 120px;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.14);
        }

        .stat-card .stat-num {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ===== Search Bar ===== */
        .search-container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto 20px;
            padding: 0 20px;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 16px 55px 16px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box input:focus {
            border-color: var(--accent-3);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 30px rgba(72, 219, 251, 0.15);
        }

        .search-box .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* ===== Category Navigation ===== */
        .category-nav {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 10px;
            padding: 10px 20px 30px;
            overflow-x: auto;
            max-width: 1200px;
            margin: 0 auto;
            scrollbar-width: none;
            animation: fadeInUp 0.8s ease 0.5s both;
        }

        .category-nav::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .cat-btn.active {
            background: linear-gradient(135deg, var(--accent-6), var(--accent-5));
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 20px rgba(95, 39, 205, 0.4);
        }

        .cat-btn .cat-emoji {
            font-size: 1.2rem;
        }

        /* ===== Main Content ===== */
        .main-content {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* ===== Category Section ===== */
        .category-section {
            margin-bottom: 50px;
            animation: fadeInUp 0.6s ease both;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px 25px;
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }

        .category-header::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            padding: 2px;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-6), var(--accent-4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .category-header .cat-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .category-header .cat-info h2 {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 800;
        }

        .category-header .cat-info .cat-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ===== Questions Grid ===== */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        @media (max-width: 400px) {
            .questions-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== Question Card ===== */
        .q-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .q-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            transition: var(--transition);
        }

        .q-card:hover {
            background: var(--card-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .q-card .q-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .q-card .q-emoji {
            font-size: 1.8rem;
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            transition: var(--transition);
        }

        .q-card:hover .q-emoji {
            transform: scale(1.15) rotate(-5deg);
            background: rgba(255, 255, 255, 0.14);
        }

        .q-card .q-text {
            flex: 1;
        }

        .q-card .q-label {
            font-size: 0.7rem;
            color: var(--accent-3);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .q-card .q-question {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .q-card .q-answer {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .q-card.show-answer .q-answer {
            opacity: 1;
            max-height: 150px;
        }

        .q-card .q-answer .answer-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), var(--accent-7));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.8rem;
            color: white;
        }

        .q-card .q-answer .answer-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--green);
        }

        .q-card .click-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 10px;
            opacity: 0.6;
            transition: var(--transition);
        }

        .q-card.show-answer .click-hint {
            opacity: 0;
            max-height: 0;
            margin: 0;
        }

        /* ===== Card Color Accents ===== */
        .q-card[data-color="1"]::before {
            background: var(--accent-1);
        }

        .q-card[data-color="2"]::before {
            background: var(--accent-2);
        }

        .q-card[data-color="3"]::before {
            background: var(--accent-3);
        }

        .q-card[data-color="4"]::before {
            background: var(--accent-4);
        }

        .q-card[data-color="5"]::before {
            background: var(--accent-5);
        }

        .q-card[data-color="6"]::before {
            background: var(--accent-6);
        }

        .q-card[data-color="7"]::before {
            background: var(--accent-7);
        }

        .q-card[data-color="8"]::before {
            background: var(--accent-8);
        }

        .q-card[data-color="9"]::before {
            background: var(--accent-9);
        }

        .q-card[data-color="10"]::before {
            background: var(--accent-10);
        }

        /* ===== Loading State ===== */
        .loader {
            text-align: center;
            padding: 80px 20px;
        }

        .loader .spinner {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-3);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== Search Highlights ===== */
        mark.highlight-text {
            background-color: rgba(254, 202, 87, 0.25);
            color: var(--accent-2);
            padding: 0 4px;
            border-radius: 6px;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.15);
            border-bottom: 2px solid var(--accent-2);
        }

        /* ===== No Results ===== */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }

        .no-results .nr-emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .no-results p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* ===== Back to Top ===== */
        .back-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-6), var(--accent-5));
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(95, 39, 205, 0.5);
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }

        .back-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .back-top:hover {
            transform: translateY(-3px) scale(1.1);
        }

        /* ===== Footer ===== */
        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer span {
            color: var(--accent-1);
        }

        /* ===== Animations ===== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-6);
            border-radius: 10px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 15px 30px;
            }

            .hero-stats {
                gap: 10px;
            }

            .stat-card {
                min-width: 100px;
                padding: 12px 18px;
            }

            .questions-grid {
                grid-template-columns: 1fr;
            }

            .q-card {
                padding: 16px;
            }

            .category-header {
                padding: 15px 18px;
                gap: 10px;
            }

            .category-header .cat-icon {
                font-size: 2rem;
            }

            .back-top {
                bottom: 20px;
                left: 20px;
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>

<body>

    <!-- Floating Background Emojis -->
    <div class="bg-shapes" id="bgShapes"></div>

    <!-- Hero Header -->
    <header class="hero">
        <div class="hero-badge">
            <i class="fas fa-star"></i>
            للمرحلة الابتدائية
        </div>
        <h1>
            <span class="lamp">🏮</span>
            أطلس العبقري الصغير
        </h1>
        <p>بنك أسئلة مسابقة فانوس المعرفة — اختبر معلوماتك!</p>
        <div class="hero-stats">
            <div class="stat-card">
                <div class="stat-num" id="totalQ">0</div>
                <div class="stat-label">سؤال</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="totalCat">0</div>
                <div class="stat-label">فئة</div>
            </div>
            <div class="stat-card">
                <div class="stat-num">🏆</div>
                <div class="stat-label">تحدى نفسك!</div>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن سؤال..." />
            <i class="fas fa-search search-icon"></i>
        </div>
    </div>

    <!-- Category Navigation -->
    <nav class="category-nav" id="categoryNav"></nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>جاري تحميل الأسئلة...</p>
        </div>
    </main>

    <!-- No Results -->
    <div class="no-results" id="noResults">
        <div class="nr-emoji">🤔</div>
        <p>لم يتم العثور على نتائج... جرب كلمة أخرى!</p>
    </div>

    <!-- Back to Top -->
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Footer -->
    <footer class="footer">
        صنع بـ <span>❤️</span> لأطفالنا الأذكياء — أطلس العبقري الصغير
    </footer>

    <script>
        // ===== Arabic Text Normalizer =====
        // Comprehensive mapping: Arabic Presentation Forms → Standard Arabic
        const AR_FORM_MAP = {};

            [0xFE80, 0x0621], [0xFE81, 0x0622], [0xFE82, 0x0622],
            [0xFE83, 0x0623], [0xFE84, 0x0623], [0xFE85, 0x0624], [0xFE86, 0x0624],
            [0xFE87, 0x0625], [0xFE88, 0x0625], [0xFE89, 0x0626], [0xFE8A, 0x0626],
            [0xFE8B, 0x0626], [0xFE8C, 0x0626], [0xFE8D, 0x0627], [0xFE8E, 0x0627],
            [0xFE8F, 0x0628], [0xFE90, 0x0628], [0xFE91, 0x0628], [0xFE92, 0x0628],
            [0xFE93, 0x0629], [0xFE94, 0x0629],

            let patterns = queryWords.filter(w => w.length > 1).map(word => {

                    if (char === 'ا') return '[اأإآ]' + diacritics;

                    if (char === 'ي') return '[يىئ]' + diacritics;
                    if (char === 'و') return '[وؤ]' + diacritics;
                    return char + diacritics;
                }).join('');

            if (patterns.length === 0) return text;

            // Combine words into one OR regex pattern
            const combinedPattern = `(${patterns.join('|')})`;

            try {
                const regex = new RegExp(combinedPattern, 'gi');
                return text.replace(regex, '<mark class="highlight-text">$1</mark>');

            const allBtn = document.createElement('button');
            allBtn.className = 'cat-btn active';
            allBtn.innerHTML = `<span class="cat-emoji">📚</span> الكل`;
            allBtn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
                showCategory(-1);
            };
            nav.appendChild(allBtn);

            data.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                const emoji = getCategoryEmoji(cat.category);
                btn.innerHTML = `<span class="cat-emoji">${emoji}</span> ${cat.category.substring(0, 30)}`;
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showCategory(i);
                };
                nav.appendChild(btn);
            });
        }

        function renderCategories(data, filter = '') {
            const main = document.getElementById('mainContent');
            // Remove old sections (keep loader)
            main.querySelectorAll('.category-section').forEach(el => el.remove());

            let hasResults = false;

            // Prepare search words for Smart Search
            const searchWords = filter ? normalizeForSearch(filter).split(/\s+/).filter(w => w.length > 0) : [];

            data.forEach((cat, catIdx) => {
                let filteredQ = cat.questions;

                // Smart search filter logic
                if (searchWords.length > 0) {
                    filteredQ = cat.questions.filter(q => {
                        const normQ = normalizeForSearch(q.question);
                        const normA = normalizeForSearch(q.answer);
                        // All search words must be present in either question or answer
                        return searchWords.every(word => normQ.includes(word) || normA.includes(word));
                    });
                }

                if (filteredQ.length === 0) return;
                hasResults = true;

                const section = document.createElement('section');
                section.className = 'category-section';
                section.setAttribute('data-cat', catIdx);
                section.style.animationDelay = (catIdx * 0.1) + 's';

                const emoji = getCategoryEmoji(cat.category);
                const catSet = findCategorySet(cat.category);

                section.innerHTML = `
                    <div class="category-header">
                        <div class="cat-icon">${emoji}</div>
                        <div class="cat-info">
                            <h2>${cat.category}</h2>
                            <div class="cat-count">${filteredQ.length} سؤال</div>
                        </div>
                    </div>
                    <div class="questions-grid"></div>
                `;

                const grid = section.querySelector('.questions-grid');

                filteredQ.forEach((q, qIdx) => {
                    const qEmoji = getQuestionEmoji(q.question, catSet, qIdx);
                    const qIcon = getQuestionIcon(q.question, catSet, qIdx);
                    const colorIdx = ((catIdx * 3 + qIdx) % 10) + 1;

                    const card = document.createElement('div');
                    card.className = 'q-card';
                    card.setAttribute('data-color', colorIdx);
                    card.onclick = () => card.classList.toggle('show-answer');

                    // Highlight matched text
                    const displayQuestion = searchWords.length > 0 ? highlightMatch(q.question, searchWords) : q.question;
                    const displayAnswer = searchWords.length > 0 ? highlightMatch(q.answer, searchWords) : q.answer;

                    card.innerHTML = `
                        <div class="q-top">
                            <div class="q-emoji">${qEmoji}</div>
                            <div class="q-text">
                                <div class="q-label">${qIcon} سؤال</div>
                                <div class="q-question">${displayQuestion}</div>
                            </div>
                        </div>
                        <div class="q-answer">
                            <div class="answer-icon"><i class="fas fa-check"></i></div>
                            <div class="answer-text">${displayAnswer}</div>
                        </div>
                        <div class="click-hint">👆 اضغط لإظهار الإجابة</div>
                    `;

                    grid.appendChild(card);
                });

                main.appendChild(section);
            });

            document.getElementById('noResults').style.display = hasResults ? 'none' : 'block';
        }

        function showCategory(idx) {
            const sections = document.querySelectorAll('.category-section');
            if (idx === -1) {
                sections.forEach(s => s.style.display = '');
            } else {
                sections.forEach(s => {
                    s.style.display = s.getAttribute('data-cat') == idx ? '' : 'none';
                });
            }
        }

        // ===== Search =====
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function () {
            clearTimeout(searchTimeout);
            const val = this.value.trim();
            searchTimeout = setTimeout(() => {
                renderCategories(allData, val);
                // Reset category nav
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.cat-btn').classList.add('active');
            }, 300);
        });

        // ===== Animate Numbers =====
        function animateNumber(id, target) {
            const el = document.getElementById(id);
            let current = 0;
            const step = Math.ceil(target / 40);
            const interval = setInterval(() => {
                current += step;
                if (current >= target) {
                    current = target;
                    clearInterval(interval);
                }
                el.textContent = current;
            }, 30);
        }

        // ===== Back to Top Visibility =====
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backTop');
            btn.classList.toggle('visible', window.scrollY > 400);
        });

        // ===== Initialize =====
        createBgShapes();
        loadData();
    </script>
</body>

</html>
