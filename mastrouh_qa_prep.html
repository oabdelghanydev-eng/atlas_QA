<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فانوس المعرفة — المرحلة الإعدادية | ملتقى مسطروه</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./public/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./public/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./public/favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./public/favicon/apple-touch-icon.png" />

    <!-- SEO -->
    <meta name="description"
        content="فانوس المعرفة — بنك الأسئلة الشامل للمرحلة الإعدادية من ملتقى مسطروه السنوي. 1200 سؤال في 12 مجالاً معرفياً." />
    <meta name="theme-color" content="#0A1628" />
    <meta property="og:title" content="فانوس المعرفة — المرحلة الإعدادية | ملتقى مسطروه" />
    <meta property="og:description" content="بنك أسئلة فانوس المعرفة الشامل للمرحلة الإعدادية — ملتقى مسطروه السنوي" />
    <meta property="og:image" content="./public/images/logo.png" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Montserrat:wght@400;700;900&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --deep-navy: #0A1628;
            --navy-mid: #152238;
            --teal-accent: #00C9A7;
            --teal-light: #E0FFF7;
            --gold-accent: #D4AF37;
            --off-white: #F0F4F8;
            --dark-text: #1A2332;
            --white: #ffffff;
            --border-light: rgba(0, 201, 167, 0.12);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --shadow-sm: 0 4px 6px rgba(10, 22, 40, 0.06);
            --shadow-md: 0 10px 25px rgba(10, 22, 40, 0.1);
            --shadow-hover: 0 15px 35px rgba(10, 22, 40, 0.15);
            --gradient-hero: linear-gradient(135deg, #0A1628 0%, #152238 50%, #1a3050 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--off-white);
            color: var(--dark-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-text-size-adjust: 100%;
            width: 100%;
        }

        h1, h2, h3 { font-weight: 800; }

        .en-text { font-family: 'Montserrat', sans-serif; }

        /* ========== Hero ========== */
        .hero {
            background: var(--gradient-hero);
            padding: 40px 15px 35px;
            text-align: center;
            color: var(--white);
            border-bottom: 4px solid var(--teal-accent);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 60%, rgba(0,201,167,0.06) 0%, transparent 60%),
                        radial-gradient(circle at 70% 30%, rgba(212,175,55,0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-logo img {
            height: 65px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 15px rgba(0, 201, 167, 0.3));
            animation: fadeInDown 0.8s ease;
        }

        .hero h1 {
            font-size: clamp(1.4rem, 5vw, 2.8rem);
            margin-bottom: 8px;
            animation: fadeInDown 0.6s ease;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        .hero h1 .lantern { color: var(--teal-accent); }

        .tagline {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            font-weight: 400;
            animation: fadeInDown 0.7s ease;
        }
        .tagline .stage-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--teal-accent), #00b894);
            color: var(--deep-navy);
            padding: 4px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
            margin-right: 6px;
        }

        /* Stats */
        .stats-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(0, 201, 167, 0.2);
            border-radius: 14px;
            padding: 12px 20px;
            min-width: 100px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--teal-accent);
        }
        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }

        /* ========== Search ========== */
        .search-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px 12px 10px;
        }
        .search-box {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }
        .search-box input {
            width: 100%;
            padding: 14px 50px 14px 18px;
            border-radius: 14px;
            border: 2px solid var(--border-light);
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--white);
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .search-box input::placeholder { color: #aaa; font-weight: 400; }
        .search-box input:focus {
            outline: none;
            border-color: var(--teal-accent);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 201, 167, 0.15);
        }
        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--teal-accent);
            font-size: 1.2rem;
        }

        /* ========== Section Nav (Mobile: Dropdown, Desktop: Buttons) ========== */
        .section-dropdown-wrapper {
            max-width: 1200px;
            margin: 12px auto 10px;
            padding: 0 12px;
            position: relative;
        }
        .section-dropdown-toggle {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            background: var(--white);
            border: 2px solid var(--border-light);
            font-family: inherit;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--deep-navy);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .section-dropdown-toggle:hover,
        .section-dropdown-toggle:focus { border-color: var(--teal-accent); }
        .section-dropdown-toggle .toggle-label { display: flex; align-items: center; gap: 10px; }
        .section-dropdown-toggle .toggle-chevron { transition: transform 0.3s ease; color: var(--teal-accent); }
        .section-dropdown-wrapper.open .toggle-chevron { transform: rotate(180deg); }

        .section-dropdown-menu {
            position: absolute;
            top: calc(100% + 5px);
            right: 12px;
            left: 12px;
            background: var(--white);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(10, 22, 40, 0.15);
            z-index: 200;
            display: none;
            overflow: hidden;
            max-height: 400px;
            overflow-y: auto;
            animation: slideDown 0.25s ease;
        }
        .section-dropdown-wrapper.open .section-dropdown-menu { display: block; }

        .section-dropdown-item {
            width: 100%;
            padding: 13px 18px;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--deep-navy);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            text-align: right;
        }
        .section-dropdown-item:last-child { border-bottom: none; }
        .section-dropdown-item:hover,
        .section-dropdown-item:focus { background: var(--teal-light); }
        .section-dropdown-item.active { background: var(--deep-navy); color: var(--teal-accent); }
        .section-dropdown-item i { width: 22px; text-align: center; font-size: 1rem; }

        /* Desktop horizontal nav */
        .section-nav {
            max-width: 1200px;
            margin: 20px auto 15px;
            padding: 0 12px;
            display: none;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .section-nav::-webkit-scrollbar { display: none; }

        .section-btn {
            background: var(--white);
            border: 1px solid var(--border-light);
            color: var(--deep-navy);
            padding: 10px 16px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .section-btn:hover {
            border-color: var(--teal-accent);
            color: var(--teal-accent);
            transform: translateY(-2px);
        }
        .section-btn.active {
            background: var(--deep-navy);
            color: var(--teal-accent);
            border-color: var(--deep-navy);
        }

        /* ========== Main Content ========== */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 12px 60px;
            flex-grow: 1;
        }

        /* Section Group */
        .section-group {
            margin-bottom: 40px;
            animation: fadeInUp 0.5s ease both;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-light);
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            color: var(--deep-navy);
        }
        .section-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--teal-accent), #00b894);
            color: var(--white);
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .section-count {
            font-size: 0.8rem;
            background: var(--teal-light);
            color: var(--deep-navy);
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 700;
            white-space: nowrap;
        }

        /* SubSection */
        .subsection-group {
            margin-bottom: 24px;
        }
        .subsection-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 8px 14px;
            background: linear-gradient(90deg, rgba(0,201,167,0.08), transparent);
            border-right: 3px solid var(--teal-accent);
            border-radius: 0 8px 8px 0;
        }
        .subsection-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--deep-navy);
        }
        .subsection-count {
            font-size: 0.75rem;
            background: var(--deep-navy);
            color: var(--teal-accent);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 700;
        }

        /* Question Grid */
        .q-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* Question Card */
        .q-card {
            background: var(--white);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            position: relative;
        }
        .q-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
            border-color: rgba(0, 201, 167, 0.25);
        }
        .q-card.open { border-color: var(--teal-accent); }

        .q-header { display: flex; align-items: flex-start; gap: 12px; }

        .q-icon-badge {
            width: 36px;
            height: 36px;
            min-width: 36px;
            background: linear-gradient(135deg, rgba(0, 201, 167, 0.1), rgba(0, 201, 167, 0.05));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--teal-accent);
            font-size: 0.95rem;
        }

        .q-text-content { flex: 1; }
        .q-number-label {
            font-size: 0.7rem;
            color: #999;
            margin-bottom: 3px;
            display: block;
        }
        .q-text {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--dark-text);
            line-height: 1.7;
        }

        .q-skill-badge {
            display: inline-block;
            background: rgba(0, 201, 167, 0.08);
            color: var(--teal-accent);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 8px;
            margin-top: 6px;
        }

        .q-answer-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 0;
            padding: 0 0 0 48px;
        }
        .q-card.open .q-answer-wrapper {
            max-height: 300px;
            padding: 12px 0 5px 48px;
            margin-top: 8px;
            border-top: 1px dashed var(--border-light);
        }

        .answer-icon {
            width: 28px;
            height: 28px;
            min-width: 28px;
            background: linear-gradient(135deg, var(--teal-accent), #00b894);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 0.7rem;
        }

        .answer-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2d3436;
            line-height: 1.7;
        }

        .q-hint {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 8px;
            transition: opacity 0.3s;
        }
        .q-card.open .q-hint { opacity: 0; height: 0; margin: 0; overflow: hidden; }

        /* Highlight */
        .highlight-text {
            background: rgba(0, 201, 167, 0.2);
            padding: 1px 4px;
            border-radius: 3px;
            color: var(--deep-navy);
            font-weight: 800;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .no-results i { font-size: 3rem; color: var(--teal-accent); margin-bottom: 15px; display: block; }

        /* Loader */
        .loader {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 201, 167, 0.2);
            border-top-color: var(--teal-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        /* Back to Top */
        .back-top {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--teal-accent), #00b894);
            border: none;
            border-radius: 50%;
            color: var(--white);
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 201, 167, 0.3);
            z-index: 100;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }
        .back-top.visible { opacity: 1; pointer-events: auto; }

        /* Footer */
        footer {
            background: var(--deep-navy);
            text-align: center;
            padding: 28px 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: auto;
        }
        footer span { color: var(--teal-accent); font-weight: 700; }
        footer .footer-logo {
            width: 90px;
            margin-bottom: 12px;
            filter: brightness(0) invert(1) opacity(0.7);
        }

        /* ========== Tablet (768px+) ========== */
        @media (min-width: 768px) {
            .hero { padding: 55px 20px 45px; }
            .hero-logo img { height: 80px; }
            .hero h1 { font-size: clamp(1.8rem, 4vw, 3rem); }
            .tagline { font-size: 1.1rem; margin-bottom: 28px; }
            .stat-box { padding: 15px 30px; min-width: 130px; }
            .stat-value { font-size: 2.3rem; }
            .stats-container { gap: 15px; }

            .search-section { padding: 22px 20px 12px; }
            .search-box input { padding: 16px 55px 16px 22px; font-size: 1.05rem; }

            .section-dropdown-wrapper { display: none; }
            .section-nav { display: flex; margin: 28px auto 18px; padding: 0 20px; gap: 10px; }

            .main-container { padding: 20px 20px 70px; }

            .q-grid {
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 16px;
            }

            .q-card { padding: 20px; border-radius: 16px; }
            .section-title { font-size: 1.5rem; }
            footer { padding: 35px 20px; font-size: 1rem; }
            footer .footer-logo { width: 120px; }
        }

        /* ========== Desktop (1024px+) ========== */
        @media (min-width: 1024px) {
            .hero { padding: 65px 40px 55px; border-bottom-width: 5px; }
            .hero-logo img { height: 95px; }
            .hero h1 { font-size: clamp(2.5rem, 4vw, 3.5rem); }
            .tagline { font-size: 1.3rem; margin-bottom: 35px; }
            .stat-box { padding: 18px 40px; min-width: 160px; }
            .stat-value { font-size: 2.6rem; }
            .stat-box:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2); }
            .search-box input { padding: 18px 60px 18px 25px; font-size: 1.15rem; }
            .q-grid { gap: 20px; }
            .q-card { padding: 22px; }
            .q-text { font-size: 1.05rem; }
            .section-title { font-size: 1.7rem; }
            .back-top { width: 55px; height: 55px; bottom: 30px; left: 30px; font-size: 1.4rem; }
        }

        /* ========== Animations ========== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <!-- Hero Header -->
    <header class="hero">
        <div class="hero-logo">
            <img src="./public/images/logo.png" alt="ملتقى مسطروه"
                onerror="this.outerHTML='<i class=\'fas fa-lantern\' style=\'font-size:4rem;color:var(--teal-accent);\'></i>'" />
        </div>
        <h1><span class="lantern">فانوس</span> المعرفة — بنك الأسئلة</h1>
        <div class="tagline">
            <span class="stage-badge"><i class="fas fa-graduation-cap"></i> المرحلة الإعدادية</span>
            مسار التميز.. من الفكرة إلى الأثر المستدام
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-value en-text" id="stat-q">0</div>
                <div class="stat-label">سؤال معرفي</div>
            </div>
            <div class="stat-box">
                <div class="stat-value en-text" id="stat-s">0</div>
                <div class="stat-label">مجال رئيسي</div>
            </div>
            <div class="stat-box">
                <div class="stat-value en-text" id="stat-sub">0</div>
                <div class="stat-label">محور فرعي</div>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <section class="search-section">
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="ابحث في الأسئلة والمحاور..." autocomplete="off" />
        </div>
    </section>

    <!-- Section Nav: Mobile Dropdown -->
    <div class="section-dropdown-wrapper" id="sectionDropdownWrapper">
        <button class="section-dropdown-toggle" id="sectionDropdownToggle" onclick="toggleDropdown()">
            <span class="toggle-label"><i class="fas fa-border-all"></i> <span id="dropdownLabel">جميع المجالات</span></span>
            <i class="fas fa-chevron-down toggle-chevron"></i>
        </button>
        <div class="section-dropdown-menu" id="sectionDropdownMenu"></div>
    </div>

    <!-- Section Nav: Desktop Horizontal -->
    <nav class="section-nav" id="sectionNav"></nav>

    <!-- Main Content -->
    <main class="main-container" id="mainContent">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>يتم تحميل فانوس المعرفة...</p>
        </div>
    </main>

    <div class="no-results" id="noResults" style="display: none;">
        <i class="fas fa-folder-open"></i>
        <p>لا توجد نتائج مطابقة، جرب كلمات مفتاحية أخرى</p>
    </div>

    <!-- Back to Top -->
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Footer -->
    <footer>
        <img src="./public/images/logo.png" alt="شعار مسطروه" class="footer-logo" onerror="this.style.display='none'" />
        <p>المؤسسية، التميز، والأثر المستدام &mdash; &copy; 2026 <span>ملتقى مسطروه السنوي</span></p>
    </footer>

    <script>
        // Section Icons
        const SECTION_ICONS = {
            'السيرة النبوية': 'fas fa-book-quran',
            'العلوم والتفكير الاستقصائي': 'fas fa-flask-vial',
            'الجغرافيا والتفكير المكاني': 'fas fa-earth-africa',
            'التاريخ الحضاري ومهارات الاستنباط التاريخي': 'fas fa-landmark-dome',
            'التفكير الحوسبي والتكنولوجيا المتقدمة والمنطق البرمجي': 'fas fa-microchip',
            'التربية الإسلامية وفقه النوازل': 'fas fa-mosque',
            'الفيزياء الفلكية، علوم الفضاء، وألغاز الكون': 'fas fa-satellite',
            'الرياضيات المتقدمة والمنطق': 'fas fa-calculator',
            'المهارات الحياتية والتفكير الإبداعي والذكاء المالي والعاطفي': 'fas fa-lightbulb',
            'المهارات اللغوية والذكاء اللفظي': 'fas fa-language',
            'الأدب العالمي، وتاريخ الفنون، والجماليات': 'fas fa-palette',
            'المهارات اللغوية المتقدمة، البلاغة، والنقد الأدبي': 'fas fa-pen-fancy',
            'DEFAULT': 'fas fa-layer-group'
        };

        // Short names for nav
        const SHORT_NAMES = {
            'السيرة النبوية': 'السيرة النبوية',
            'العلوم والتفكير الاستقصائي': 'العلوم',
            'الجغرافيا والتفكير المكاني': 'الجغرافيا',
            'التاريخ الحضاري ومهارات الاستنباط التاريخي': 'التاريخ',
            'التفكير الحوسبي والتكنولوجيا المتقدمة والمنطق البرمجي': 'البرمجة والتفكير',
            'التربية الإسلامية وفقه النوازل': 'التربية الإسلامية',
            'الفيزياء الفلكية، علوم الفضاء، وألغاز الكون': 'الفضاء والفلك',
            'الرياضيات المتقدمة والمنطق': 'الرياضيات',
            'المهارات الحياتية والتفكير الإبداعي والذكاء المالي والعاطفي': 'المهارات الحياتية',
            'المهارات اللغوية والذكاء اللفظي': 'الذكاء اللفظي',
            'الأدب العالمي، وتاريخ الفنون، والجماليات': 'الأدب والفنون',
            'المهارات اللغوية المتقدمة، البلاغة، والنقد الأدبي': 'البلاغة والنقد'
        };

        // Question keyword icons
        const Q_KEYWORDS = [
            { words: ['نبي', 'رسول', 'قرآن', 'صحابي', 'صلاة', 'إسلام', 'غزوة', 'هجرة'], icon: 'fas fa-mosque' },
            { words: ['عاصمة', 'بلد', 'دولة', 'قارة', 'محيط', 'خريطة'], icon: 'fas fa-earth-americas' },
            { words: ['معركة', 'ملك', 'امبراطور', 'ثورة', 'حضارة'], icon: 'fas fa-shield-halved' },
            { words: ['جبل', 'نهر', 'وادي', 'مناخ', 'بيئة'], icon: 'fas fa-mountain' },
            { words: ['كم', 'ما هو', 'متى', 'أين', 'من هو', 'لماذا'], icon: 'fas fa-circle-question' },
            { words: ['عالم', 'اكتشف', 'اخترع', 'تكنولوجيا'], icon: 'fas fa-lightbulb' },
            { words: ['كود', 'برمجة', 'خوارزمية', 'حاسب'], icon: 'fas fa-code' },
            { words: ['رياضيات', 'حساب', 'مسألة', 'معادلة'], icon: 'fas fa-square-root-variable' },
            { words: ['فيزياء', 'كيمياء', 'ذرة', 'طاقة', 'قوة'], icon: 'fas fa-atom' },
            { words: ['فضاء', 'كوكب', 'قمر', 'شمس', 'نجم'], icon: 'fas fa-star' }
        ];

        function getQIcon(text) {
            for (let item of Q_KEYWORDS) {
                if (item.words.some(w => text.includes(w))) return item.icon;
            }
            return 'fas fa-quote-right';
        }

        // Smart Search
        const AR_FORM_MAP = {};
        [['أ', 'ا'], ['إ', 'ا'], ['آ', 'ا'], ['ة', 'ه'], ['ى', 'ي'], ['ؤ', 'و'], ['ئ', 'ي']]
            .forEach(([from, to]) => AR_FORM_MAP[from] = to);

        function normalizeForSearch(text) {
            if (!text) return '';
            let res = text.replace(/[\u064B-\u065F\u0610-\u061A\u0670\ـ]/g, '');
            let chars = res.split('');
            for (let i = 0; i < chars.length; i++) {
                if (AR_FORM_MAP[chars[i]]) chars[i] = AR_FORM_MAP[chars[i]];
            }
            return chars.join('').replace(/[^\u0600-\u06FFa-zA-Z0-9\s]/g, '').toLowerCase().trim();
        }

        function highlightMatch(text, queryWords) {
            if (!queryWords || queryWords.length === 0) return text;
            const diacritics = '[\\u064B-\\u065F\\u0610-\\u061A\\u0670]*';
            let patterns = queryWords.filter(w => w.length > 1).map(word => {
                return word.split('').map(char => {
                    if (char === 'ا') return '[اأإآ]' + diacritics;
                    if (char === 'ه') return '[هة]' + diacritics;
                    if (char === 'ي') return '[يىئ]' + diacritics;
                    if (char === 'و') return '[وؤ]' + diacritics;
                    return char + diacritics;
                }).join('');
            });
            if (patterns.length === 0) return text;
            try {
                const regex = new RegExp(`(${patterns.join('|')})`, 'gi');
                return text.replace(regex, '<mark class="highlight-text">$1</mark>');
            } catch (e) { return text; }
        }

        // State
        let dbData = [];

        async function init() {
            try {
                const res = await fetch('./prep_content.json');
                const data = await res.json();
                dbData = data;
                document.getElementById('loader').style.display = 'none';

                let qCount = 0, subCount = 0;
                data.forEach(s => { qCount += s.totalQuestions; subCount += s.subSections.length; });

                animateValue("stat-q", 0, qCount, 1500);
                animateValue("stat-s", 0, data.length, 1000);
                animateValue("stat-sub", 0, subCount, 1200);

                renderNav(data);
                renderLists(data);
            } catch (err) {
                document.getElementById('loader').innerHTML = '<div style="font-size:3rem;margin-bottom:15px;color:var(--teal-accent)"><i class="fas fa-triangle-exclamation"></i></div><p style="color:var(--deep-navy);font-weight:700">حدث خطأ في جلب البيانات، يرجى تشغيل الخادم.</p>';
                console.error(err);
            }
        }

        function renderNav(data) {
            const nav = document.getElementById('sectionNav');
            nav.innerHTML = `<button class="section-btn active" data-idx="-1" onclick="filterSection(-1, this)"><i class="fas fa-border-all"></i> الكل</button>`;
            data.forEach((s, idx) => {
                const icon = SECTION_ICONS[s.section] || SECTION_ICONS['DEFAULT'];
                const short = SHORT_NAMES[s.section] || s.section;
                nav.innerHTML += `<button class="section-btn" data-idx="${idx}" onclick="filterSection(${idx}, this)"><i class="${icon}"></i> ${short}</button>`;
            });

            const menu = document.getElementById('sectionDropdownMenu');
            menu.innerHTML = `<button class="section-dropdown-item active" data-idx="-1" onclick="selectDropdownItem(-1, this)"><i class="fas fa-border-all"></i> جميع المجالات</button>`;
            data.forEach((s, idx) => {
                const icon = SECTION_ICONS[s.section] || SECTION_ICONS['DEFAULT'];
                const short = SHORT_NAMES[s.section] || s.section;
                menu.innerHTML += `<button class="section-dropdown-item" data-idx="${idx}" onclick="selectDropdownItem(${idx}, this)"><i class="${icon}"></i> ${short} <span style="margin-right:auto;font-size:0.75rem;color:#999">${s.totalQuestions}</span></button>`;
            });
        }

        function toggleDropdown() {
            document.getElementById('sectionDropdownWrapper').classList.toggle('open');
        }
        document.addEventListener('click', (e) => {
            const wrapper = document.getElementById('sectionDropdownWrapper');
            if (wrapper && !wrapper.contains(e.target)) wrapper.classList.remove('open');
        });

        function selectDropdownItem(idx, item) {
            document.querySelectorAll('.section-dropdown-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const icon = item.querySelector('i').className;
            const label = idx === -1 ? 'جميع المجالات' : item.childNodes[1].textContent.trim();
            document.getElementById('dropdownLabel').textContent = label;
            document.querySelector('#sectionDropdownToggle .toggle-label i').className = icon;
            document.getElementById('sectionDropdownWrapper').classList.remove('open');
            document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
            const matchBtn = document.querySelector(`.section-btn[data-idx="${idx}"]`);
            if (matchBtn) matchBtn.classList.add('active');
            applyFilter(idx);
        }

        function filterSection(idx, btn = null) {
            document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            else document.querySelector('.section-btn').classList.add('active');
            document.querySelectorAll('.section-dropdown-item').forEach(i => i.classList.remove('active'));
            const matchItem = document.querySelector(`.section-dropdown-item[data-idx="${idx}"]`);
            if (matchItem) {
                matchItem.classList.add('active');
                const icon = matchItem.querySelector('i').className;
                const label = idx === -1 ? 'جميع المجالات' : matchItem.childNodes[1].textContent.trim();
                document.getElementById('dropdownLabel').textContent = label;
                document.querySelector('#sectionDropdownToggle .toggle-label i').className = icon;
            }
            applyFilter(idx);
        }

        function applyFilter(idx) {
            const sections = document.querySelectorAll('.section-group');
            if (idx === -1) {
                sections.forEach(s => s.style.display = 'block');
            } else {
                sections.forEach(s => {
                    s.style.display = parseInt(s.dataset.idx) === idx ? 'block' : 'none';
                });
            }
            document.getElementById('searchInput').value = '';
            renderLists(dbData);
            if (idx !== -1) {
                const updatedSections = document.querySelectorAll('.section-group');
                updatedSections.forEach(s => {
                    s.style.display = parseInt(s.dataset.idx) === idx ? 'block' : 'none';
                });
            }
        }

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                document.querySelectorAll('.section-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.section-btn').classList.add('active');
                renderLists(dbData, e.target.value);
            }, 300);
        });

        function renderLists(data, query = '') {
            const main = document.getElementById('mainContent');
            main.innerHTML = '';
            const searchWords = query ? normalizeForSearch(query).split(/\s+/).filter(w => w.length > 0) : [];
            let foundAny = false;

            data.forEach((sectionObj, secIdx) => {
                const secIcon = SECTION_ICONS[sectionObj.section] || SECTION_ICONS['DEFAULT'];
                let sectionHasResults = false;
                let subsHTML = '';

                sectionObj.subSections.forEach(sub => {
                    let filteredQs = sub.questions;
                    if (searchWords.length > 0) {
                        filteredQs = sub.questions.filter(q => {
                            const nQ = normalizeForSearch(q.question);
                            const nA = normalizeForSearch(q.answer);
                            const nS = normalizeForSearch(q.skill);
                            return searchWords.every(w => nQ.includes(w) || nA.includes(w) || nS.includes(w));
                        });
                    }
                    if (filteredQs.length === 0) return;
                    sectionHasResults = true;

                    let cardsHtml = '';
                    filteredQs.forEach((q) => {
                        const dispQ = searchWords.length > 0 ? highlightMatch(q.question, searchWords) : q.question;
                        const dispA = searchWords.length > 0 ? highlightMatch(q.answer, searchWords) : q.answer;
                        const qIcon = getQIcon(q.question);

                        cardsHtml += `
                            <div class="q-card" onclick="this.classList.toggle('open')">
                                <div class="q-header">
                                    <div class="q-icon-badge"><i class="${qIcon}"></i></div>
                                    <div class="q-text-content">
                                        <span class="q-number-label">سؤال رقم ${q.number}</span>
                                        <div class="q-text">${dispQ}</div>
                                        ${q.skill ? `<span class="q-skill-badge"><i class="fas fa-brain"></i> ${q.skill}</span>` : ''}
                                    </div>
                                </div>
                                <div class="q-answer-wrapper">
                                    <div class="answer-icon"><i class="fas fa-check"></i></div>
                                    <div class="answer-text">${dispA}</div>
                                </div>
                                <div class="q-hint"><i class="fas fa-hand-pointer"></i> انقر لإظهار الإجابة</div>
                            </div>
                        `;
                    });

                    subsHTML += `
                        <div class="subsection-group">
                            <div class="subsection-header">
                                <span class="subsection-title">${sub.name}</span>
                                <span class="subsection-count">${filteredQs.length} أسئلة</span>
                            </div>
                            <div class="q-grid">${cardsHtml}</div>
                        </div>
                    `;
                });

                if (!sectionHasResults) return;
                foundAny = true;

                const section = document.createElement('section');
                section.className = 'section-group';
                section.dataset.idx = secIdx;
                section.style.animationDelay = (secIdx * 0.05) + 's';
                section.innerHTML = `
                    <div class="section-header">
                        <div class="section-title">
                            <div class="section-icon"><i class="${secIcon}"></i></div>
                            <h2>${sectionObj.section}</h2>
                        </div>
                        <div class="section-count">${sectionObj.totalQuestions} سؤال</div>
                    </div>
                    ${subsHTML}
                `;
                main.appendChild(section);
            });

            document.getElementById('noResults').style.display = foundAny ? 'none' : 'block';
        }

        function animateValue(id, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                document.getElementById(id).innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
                else document.getElementById(id).innerHTML = end;
            };
            window.requestAnimationFrame(step);
        }

        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backTop');
            if (window.scrollY > 300) btn.classList.add('visible');
            else btn.classList.remove('visible');
        });

        init();
    </script>
</body>
